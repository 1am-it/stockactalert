# .github/workflows/refresh-congress.yml — 1AM-98
#
# Weekly refresh of src/data/congress.json (and fixture) from
# unitedstates/congress-legislators. Opens a PR against `dev` when the
# directory has changed; never auto-merges.
#
# Triggers:
#   - schedule           : every Monday 09:00 UTC
#   - workflow_dispatch  : manual trigger from the Actions tab
#
# No secrets required — unitedstates is public CC0.
# Default GITHUB_TOKEN is sufficient, but the repository setting
#   Settings → Actions → General → Workflow permissions →
#   "Allow GitHub Actions to create and approve pull requests"
# must be enabled, otherwise the PR step fails with 403.

name: Refresh Congress directory

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        run: node scripts/fetch-congress.mjs

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet src/data/congress.json src/data/congress.fixture.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ No changes — Congress directory is up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "→ Changes detected — will open PR."
            git diff --stat src/data/congress.json src/data/congress.fixture.json
          fi

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: dev
          branch: chore/refresh-congress
          title: 'chore: refresh Congress directory'
          commit-message: |
            chore: refresh Congress directory (weekly auto-refresh)

            Auto-generated by .github/workflows/refresh-congress.yml.
            Source: unitedstates/congress-legislators (legislators-current.json).
          body: |
            ## Weekly Congress directory refresh

            Auto-generated by the `refresh-congress.yml` workflow.

            **Source:** [`unitedstates/congress-legislators`](https://github.com/unitedstates/congress-legislators) — `legislators-current.json`
            **Trigger:** `${{ github.event_name }}`
            **Run:** [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Review the diff, then merge into `dev`. Do not auto-merge.

            See 1AM-98 for context.
          delete-branch: true
